name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CRX_PRIVATE_KEY_BASE64: ${{ secrets.CRX_PRIVATE_KEY_BASE64 }}
      CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate tag matches manifest version
        run: |
          version="$(sed -nE 's/^[[:space:]]*"version":[[:space:]]*"([^"]+)".*/\1/p' manifest.json | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "Unable to read version from manifest.json" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version v${version}" >&2
            exit 1
          fi

      - name: Decode CRX private key from base64
        if: ${{ env.CRX_PRIVATE_KEY_BASE64 != '' }}
        run: |
          mkdir -p .tmp
          printf '%s' "$CRX_PRIVATE_KEY_BASE64" | base64 --decode > .tmp/extension.pem
          chmod 600 .tmp/extension.pem

      - name: Write CRX private key from raw PEM secret
        if: ${{ env.CRX_PRIVATE_KEY_BASE64 == '' && env.CRX_PRIVATE_KEY != '' }}
        run: |
          mkdir -p .tmp
          printf '%s' "$CRX_PRIVATE_KEY" > .tmp/extension.pem
          chmod 600 .tmp/extension.pem

      - name: Build release assets
        run: bash scripts/package-extension.sh dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --generate-notes --title "$tag"
          fi
